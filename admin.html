<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KAF — Panel Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --pink: #FF85A1; --deep-pink: #E8476A; --blush: #FFD6E0;
      --cream: #FFF5F8; --white: #FFFFFF; --text: #2a1a1a;
      --muted: #9a7a85; --border: #F0D6DF;
    }
    body { font-family: 'Space Grotesk', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }

    /* LOGIN */
    #login-page {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(160deg, #FFF0F8, #F5E8FF);
    }
    .login-box {
      background: white; padding: 48px; border-radius: 24px; width: 100%; max-width: 400px;
      box-shadow: 0 8px 40px rgba(232,71,106,0.12);
    }
    .login-box h1 { font-family: 'Bebas Neue'; font-size: 48px; color: var(--deep-pink); letter-spacing: 4px; margin-bottom: 8px; }
    .login-box p { color: var(--muted); font-size: 14px; margin-bottom: 32px; }
    .login-box input {
      width: 100%; padding: 14px 18px; border: 1.5px solid var(--border);
      border-radius: 12px; font-family: inherit; font-size: 14px;
      margin-bottom: 14px; outline: none; background: var(--cream);
    }
    .login-box input:focus { border-color: var(--pink); }
    .btn {
      width: 100%; padding: 15px; background: var(--deep-pink); color: white;
      border: none; border-radius: 50px; font-family: inherit; font-size: 14px;
      font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
      cursor: pointer; transition: all 0.2s;
    }
    .btn:hover { background: var(--pink); }
    .error-msg { color: var(--deep-pink); font-size: 13px; margin-bottom: 12px; display: none; }

    /* DASHBOARD */
    #dashboard { display: none; }
    header {
      background: white; padding: 16px 32px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 10;
    }
    header h2 { font-family: 'Bebas Neue'; font-size: 28px; letter-spacing: 4px; color: var(--deep-pink); }
    .header-right { display: flex; gap: 12px; align-items: center; }
    .btn-sm {
      padding: 10px 20px; border-radius: 50px; font-family: inherit;
      font-size: 12px; font-weight: 700; letter-spacing: 1px; cursor: pointer;
      text-transform: uppercase; border: none; transition: all 0.2s;
    }
    .btn-add { background: var(--deep-pink); color: white; }
    .btn-add:hover { background: var(--pink); }
    .btn-logout { background: var(--blush); color: var(--deep-pink); }
    .btn-logout:hover { background: var(--border); }

    .main { padding: 32px; max-width: 1200px; margin: 0 auto; }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 32px; }
    .stat-card {
      background: white; padding: 20px 24px; border-radius: 16px;
      border: 1px solid var(--border);
    }
    .stat-card .num { font-family: 'Bebas Neue'; font-size: 40px; color: var(--deep-pink); }
    .stat-card .label { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); }

    .section-title { font-family: 'Bebas Neue'; font-size: 24px; letter-spacing: 2px; color: var(--text); margin-bottom: 16px; }
    .paintings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
    .painting-card {
      background: white; border-radius: 20px; overflow: hidden;
      border: 1px solid var(--border); transition: all 0.2s;
    }
    .painting-card:hover { box-shadow: 0 8px 28px rgba(232,71,106,0.12); transform: translateY(-2px); }
    .painting-card img {
      width: 100%; aspect-ratio: 3/4; object-fit: cover; display: block;
      background: var(--blush);
    }
    .painting-card .img-placeholder {
      width: 100%; aspect-ratio: 3/4; background: var(--blush);
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 48px;
    }
    .card-body { padding: 16px; }
    .card-title { font-weight: 700; font-size: 15px; margin-bottom: 4px; }
    .card-price { color: var(--deep-pink); font-weight: 700; font-size: 16px; margin-bottom: 8px; }
    .card-status {
      display: inline-block; padding: 3px 10px; border-radius: 50px;
      font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
      margin-bottom: 12px;
    }
    .status-available { background: #d4edda; color: #155724; }
    .status-sold { background: #f8d7da; color: #721c24; }
    .card-actions { display: flex; gap: 8px; }
    .btn-edit { flex: 1; background: var(--blush); color: var(--deep-pink); }
    .btn-edit:hover { background: var(--border); }
    .btn-delete { background: #fff0f0; color: #c0392b; }
    .btn-delete:hover { background: #ffd6d6; }

    /* MODAL */
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 100;
      background: rgba(42,26,26,0.6); backdrop-filter: blur(6px);
      align-items: center; justify-content: center; padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: white; border-radius: 24px; width: 100%; max-width: 520px;
      max-height: 90vh; overflow-y: auto; padding: 40px;
      box-shadow: 0 24px 80px rgba(232,71,106,0.2);
    }
    .modal h3 { font-family: 'Bebas Neue'; font-size: 32px; color: var(--deep-pink); letter-spacing: 2px; margin-bottom: 24px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 6px; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 12px 16px; border: 1.5px solid var(--border);
      border-radius: 12px; font-family: inherit; font-size: 14px; outline: none;
      background: var(--cream); color: var(--text);
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--pink); }
    .form-group textarea { resize: vertical; min-height: 80px; }

    .img-preview { width: 100%; max-height: 200px; object-fit: contain; margin-bottom: 10px; border-radius: 12px; display: none; background: var(--blush); }
    .upload-area {
      border: 2px dashed var(--border); border-radius: 12px; padding: 24px;
      text-align: center; cursor: pointer; transition: all 0.2s; background: var(--cream);
    }
    .upload-area:hover { border-color: var(--pink); background: var(--blush); }
    .upload-area p { color: var(--muted); font-size: 13px; margin-top: 8px; }
    .upload-area .icon { font-size: 32px; }
    #file-input { display: none; }
    .upload-progress { display: none; color: var(--deep-pink); font-size: 13px; font-weight: 600; margin-top: 8px; }

    .modal-actions { display: flex; gap: 12px; margin-top: 24px; }
    .btn-cancel { flex: 1; background: var(--blush); color: var(--deep-pink); }
    .btn-save { flex: 2; background: var(--deep-pink); color: white; }
    .btn-save:hover { background: var(--pink); }

    .toast {
      position: fixed; bottom: 32px; right: 32px; z-index: 500;
      background: var(--deep-pink); color: white; padding: 14px 24px;
      border-radius: 50px; font-weight: 600; font-size: 14px;
      transform: translateY(100px); opacity: 0; transition: all 0.4s;
      box-shadow: 0 8px 28px rgba(232,71,106,0.4);
    }
    .toast.show { transform: translateY(0); opacity: 1; }

    .loading { text-align: center; padding: 60px; color: var(--muted); font-size: 14px; }

    @media (max-width: 600px) {
      .main { padding: 16px; }
      header { padding: 12px 16px; }
      .stats { grid-template-columns: 1fr 1fr; }
      .modal { padding: 24px; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-page">
  <div class="login-box">
    <h1>KAF</h1>
    <p>Panel de administración ✦ Solo para KAF</p>
    <p class="error-msg" id="login-error">Email o contraseña incorrectos.</p>
    <input type="email" id="email-input" placeholder="tu@email.com">
    <input type="password" id="pass-input" placeholder="Contraseña">
    <button class="btn" onclick="login()">Entrar ✦</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <header>
    <h2>KAF Admin ✦</h2>
    <div class="header-right">
      <button class="btn-sm btn-add" onclick="openModal()">+ Agregar Cuadro</button>
      <button class="btn-sm btn-logout" onclick="logout()">Salir</button>
    </div>
  </header>

  <div class="main">
    <div class="stats" id="stats">
      <div class="stat-card"><div class="num" id="total-count">–</div><div class="label">Cuadros en total</div></div>
      <div class="stat-card"><div class="num" id="avail-count">–</div><div class="label">Disponibles</div></div>
      <div class="stat-card"><div class="num" id="sold-count">–</div><div class="label">Vendidos</div></div>
    </div>

    <div class="section-title">Mis Cuadros</div>
    <div class="paintings-grid" id="paintings-grid">
      <div class="loading">Cargando cuadros...</div>
    </div>
  </div>
</div>

<!-- MODAL AGREGAR/EDITAR -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3 id="modal-title">Agregar Cuadro</h3>

    <div class="form-group">
      <label>Foto del cuadro</label>
      <img id="img-preview" class="img-preview" alt="Preview">
      <div class="upload-area" onclick="document.getElementById('file-input').click()">
        <div class="icon">🖼️</div>
        <p>Toca para subir una foto</p>
        <p style="font-size:11px; margin-top:4px;">JPG, PNG — máx 5MB</p>
      </div>
      <div class="upload-progress" id="upload-progress">⏳ Subiendo foto...</div>
      <input type="file" id="file-input" accept="image/*" onchange="handleFileSelect(this)">
    </div>

    <div class="form-group">
      <label>Título del cuadro</label>
      <input type="text" id="p-title" placeholder="Ej: La Aurora">
    </div>
    <div class="form-group">
      <label>Precio</label>
      <input type="text" id="p-price" placeholder="Ej: $350">
    </div>
    <div class="form-group">
      <label>Descripción (opcional)</label>
      <textarea id="p-desc" placeholder="Describe el cuadro..."></textarea>
    </div>
    <div class="form-group">
      <label>Estado</label>
      <select id="p-status">
        <option value="available">Disponible</option>
        <option value="sold">Vendido</option>
      </select>
    </div>
    <div class="form-group">
      <label>Link de Etsy (opcional)</label>
      <input type="url" id="p-etsy" placeholder="https://artbycru.etsy.com/listing/...">
    </div>

    <input type="hidden" id="p-id">
    <input type="hidden" id="p-image-url">

    <div class="modal-actions">
      <button class="btn-sm btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-sm btn-save" onclick="savePainting()">Guardar ✦</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const SUPABASE_URL = 'https://bwgiktpsmrvfaoyoftwy.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ3Z2lrdHBzbXJ2ZmFveW9mdHd5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5NzY2NjUsImV4cCI6MjA4NzU1MjY2NX0.-3YsxigCNWDeZnW8uLSro6UXsHhRNLmcJHEap0fnHz0';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  let paintings = [];
  let selectedFile = null;

  // AUTH
  async function login() {
    const email = document.getElementById('email-input').value.trim();
    const pass = document.getElementById('pass-input').value;
    const { error } = await sb.auth.signInWithPassword({ email, password: pass });
    if (error) {
      document.getElementById('login-error').style.display = 'block';
    } else {
      showDashboard();
    }
  }

  document.getElementById('pass-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });

  async function logout() {
    await sb.auth.signOut();
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('login-page').style.display = 'flex';
  }

  async function showDashboard() {
    document.getElementById('login-page').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    await loadPaintings();
  }

  // Check session on load
  (async () => {
    const { data } = await sb.auth.getSession();
    if (data.session) showDashboard();
  })();

  // LOAD PAINTINGS
  async function loadPaintings() {
    const { data, error } = await sb.from('paintings').select('*').order('sort_order', { ascending: true });
    if (error) { console.error(error); return; }
    paintings = data || [];
    renderGrid();
    updateStats();
  }

  function renderGrid() {
    const grid = document.getElementById('paintings-grid');
    if (paintings.length === 0) {
      grid.innerHTML = '<div class="loading">No hay cuadros todavía. ¡Agrega el primero!</div>';
      return;
    }
    grid.innerHTML = paintings.map(p => `
      <div class="painting-card">
        ${p.image_url
          ? `<img src="${p.image_url}" alt="${p.title}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
             <div class="img-placeholder" style="display:none">🎨</div>`
          : `<div class="img-placeholder">🎨</div>`
        }
        <div class="card-body">
          <div class="card-title">${p.title}</div>
          <div class="card-price">${p.price}</div>
          <span class="card-status status-${p.status}">${p.status === 'available' ? 'Disponible' : 'Vendido'}</span>
          <div class="card-actions">
            <button class="btn-sm btn-edit" onclick="editPainting('${p.id}')">✏️ Editar</button>
            <button class="btn-sm btn-delete" onclick="deletePainting('${p.id}')">🗑️</button>
          </div>
        </div>
      </div>
    `).join('');
  }

  function updateStats() {
    const avail = paintings.filter(p => p.status === 'available').length;
    document.getElementById('total-count').textContent = paintings.length;
    document.getElementById('avail-count').textContent = avail;
    document.getElementById('sold-count').textContent = paintings.length - avail;
  }

  // MODAL
  function openModal(id = null) {
    document.getElementById('p-id').value = '';
    document.getElementById('p-title').value = '';
    document.getElementById('p-price').value = '';
    document.getElementById('p-desc').value = '';
    document.getElementById('p-status').value = 'available';
    document.getElementById('p-etsy').value = 'https://artbycru.etsy.com';
    document.getElementById('p-image-url').value = '';
    document.getElementById('img-preview').style.display = 'none';
    document.getElementById('upload-progress').style.display = 'none';
    document.getElementById('modal-title').textContent = 'Agregar Cuadro';
    selectedFile = null;

    if (id) {
      const p = paintings.find(x => x.id === id);
      if (p) {
        document.getElementById('modal-title').textContent = 'Editar Cuadro';
        document.getElementById('p-id').value = p.id;
        document.getElementById('p-title').value = p.title;
        document.getElementById('p-price').value = p.price;
        document.getElementById('p-desc').value = p.description || '';
        document.getElementById('p-status').value = p.status;
        document.getElementById('p-etsy').value = p.etsy_url || 'https://artbycru.etsy.com';
        document.getElementById('p-image-url').value = p.image_url || '';
        if (p.image_url) {
          const prev = document.getElementById('img-preview');
          prev.src = p.image_url;
          prev.style.display = 'block';
        }
      }
    }
    document.getElementById('modal-overlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
  }

  function editPainting(id) { openModal(id); }

  // FILE UPLOAD
  function handleFileSelect(input) {
    const file = input.files[0];
    if (!file) return;
    selectedFile = file;
    const reader = new FileReader();
    reader.onload = e => {
      const prev = document.getElementById('img-preview');
      prev.src = e.target.result;
      prev.style.display = 'block';
    };
    reader.readAsDataURL(file);
  }

  async function uploadImage(file) {
    const ext = file.name.split('.').pop();
    const filename = `painting-${Date.now()}.${ext}`;
    const { data, error } = await sb.storage.from('paintings').upload(filename, file, { upsert: true });
    if (error) throw error;
    const { data: urlData } = sb.storage.from('paintings').getPublicUrl(filename);
    return urlData.publicUrl;
  }

  // SAVE
  async function savePainting() {
    const id = document.getElementById('p-id').value;
    const title = document.getElementById('p-title').value.trim();
    const price = document.getElementById('p-price').value.trim();
    const description = document.getElementById('p-desc').value.trim();
    const status = document.getElementById('p-status').value;
    const etsy_url = document.getElementById('p-etsy').value.trim();
    let image_url = document.getElementById('p-image-url').value;

    if (!title || !price) { showToast('⚠️ El título y precio son obligatorios'); return; }

    // Upload image if selected
    if (selectedFile) {
      document.getElementById('upload-progress').style.display = 'block';
      try {
        image_url = await uploadImage(selectedFile);
      } catch (e) {
        showToast('❌ Error al subir la foto');
        document.getElementById('upload-progress').style.display = 'none';
        return;
      }
      document.getElementById('upload-progress').style.display = 'none';
    }

    const payload = { title, price, description, status, etsy_url, image_url, sort_order: paintings.length + 1 };

    let error;
    if (id) {
      ({ error } = await sb.from('paintings').update(payload).eq('id', id));
    } else {
      ({ error } = await sb.from('paintings').insert(payload));
    }

    if (error) { showToast('❌ Error al guardar'); console.error(error); return; }

    showToast('✦ Guardado!');
    closeModal();
    await loadPaintings();
  }

  // DELETE
  async function deletePainting(id) {
    if (!confirm('¿Segura que quieres eliminar este cuadro?')) return;
    const { error } = await sb.from('paintings').delete().eq('id', id);
    if (error) { showToast('❌ Error al eliminar'); return; }
    showToast('✦ Cuadro eliminado');
    await loadPaintings();
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // Close modal on outside click
  document.getElementById('modal-overlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
</script>
</body>
</html>
